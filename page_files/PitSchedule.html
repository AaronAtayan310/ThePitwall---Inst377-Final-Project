<html lang="en">
    <head>
        <title>Inst377 — ThePitwall - Schedules</title>
    
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;1,300&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />
    
        <link rel="stylesheet" href="HomePageCSS.css">
        <link rel="stylesheet" href="DriverStyle.css">
        <link rel="stylesheet" href="ScheduleStyle.css">

        <script src="https://unpkg.com/lucide@latest"></script> 
        <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script> 
    </head>
    <body>

        <nav>
            <a class="nav-logo" href="PitHome.html">
                <span class="nav-logo-text">The<span>Pitwall</span></span>
            </a>
            <ul class="nav-links">
                <li><a href="PitHome.html" class="active-link">Home</a></li>
                <li><a href="PitSchedule.html" class="nav-cta">Schedule</a></li>
                <li><a href="PitDrivers.html" class="nav-cta">Drivers</a></li>
                <li><a href="PitLiveTiming.html" class="nav-cta">Live Timing</a></li>
                <li><a href="PitTelemetry.html" class="nav-cta">Telemetry</a></li>
                <li><a href="PitStrat.html" class="nav-cta">Pit Strategy</a></li>
                <li><a href="PitAbout.html" class="nav-cta">About</a></li>
            </ul>
        </nav>

        <section class="drivers-hero">
            <div class="drivers-hero-content">
                <div>
                    <div class="page-eyebrow">Race Calendar</div>
                    <h1 class="page-title"><span id="year-label">2025</span> Season</h1>
                </div>
                <div class="season-selector">
                    <label for="year-select">Select Year</label>
                    <select id="year-select">
                        <option value="2025" selected>2025 Season</option>
                        <option value="2024">2024 Season</option>
                        <option value="2023">2023 Season</option>
                    </select>
                </div>
            </div>
        </section>

        <div class="drivers-body">
            <div id="schedule-container" class="schedule-grid">
                </div>
        </div>

        <footer>
            <div class="footer-logo">The<span>Pitwall</span></div>
            <div class="footer-note">Data via OpenF1 API &mdash; INST377 Final Project &mdash; Aaron Atayan</div>
        </footer>

        <script>
            /**
             * Fetches and displays the F1 schedule for a specific year
             */
            async function loadSchedule(year) {
                const container = document.getElementById('schedule-container');
                const yearLabel = document.getElementById('year-label');
                
                // UI Update
                yearLabel.innerText = year;
                container.innerHTML = `
                    <div class="loading-state">
                        <div class="spinner"></div>
                        <p>Fetching ${year} Calendar...</p>
                    </div>
                `;

                try {
                    // Fetch 1: Get the list of Grand Prix meetings
                    const response = await fetch(`https://api.openf1.org/v1/meetings?year=${year}`);
                    const meetings = await response.json();

                    if (!meetings || meetings.length === 0) {
                        container.innerHTML = `<p>No schedule data found for ${year}.</p>`;
                        return;
                    }

                    container.innerHTML = ''; // Clear loading state

                    // Iterate and Build UI
                    for (const race of meetings) {
                        const card = document.createElement('div');
                        card.className = 'race-card';
                        
                        // Fetch 2: Get specific sessions for this race weekend
                        const sessionRes = await fetch(`https://api.openf1.org/v1/sessions?meeting_key=${race.meeting_key}`);
                        const sessions = await sessionRes.json();

                        // Using Day.js for Library Requirement #2
                        const startDate = dayjs(race.date_start).format('DD MMM');
                        const endDate = dayjs(race.date_start).add(2, 'day').format('DD MMM');

                        card.innerHTML = `
                            <div class="race-date-badge">${startDate} - ${endDate}</div>
                            <h3 class="race-name">${race.meeting_official_name}</h3>
                            <div class="race-location">
                                <i data-lucide="map-pin" style="width:14px; height:14px;"></i>
                                ${race.location}, ${race.country_name}
                            </div>
                            <div class="session-list">
                                ${sessions.length > 0 ? sessions.map(s => `
                                    <div class="session-item">
                                        <span class="session-name">${s.session_name}</span>
                                        <span class="session-time">${dayjs(s.date_start).format('HH:mm')}</span>
                                    </div>
                                `).join('') : '<div class="session-item">TBD</div>'}
                            </div>
                        `;
                        container.appendChild(card);
                    }

                    // Initialize Lucide Icons for Library Requirement #1
                    lucide.createIcons();

                } catch (err) {
                    console.error("Schedule Error:", err);
                    container.innerHTML = `
                        <div class="loading-state">
                            <p>⚠️ Failed to load schedule. Ensure your backend proxy is running.</p>
                        </div>
                    `;
                }
            }

            // Initialize Page
            window.onload = () => {
                const yearSelect = document.getElementById('year-select');
                
                yearSelect.addEventListener('change', (e) => {
                    loadSchedule(e.target.value);
                });

                // Start with the default 2025 season
                loadSchedule("2025");
            };
        </script>
    </body>
</html>
